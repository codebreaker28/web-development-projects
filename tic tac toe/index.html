<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
text-align:center;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
margin-bottom:20px;
color:#333;
}

#status{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#0077ff;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
}

.cell{
width:100px;
height:100px;
background:#f1f1f1;
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:bold;
cursor:pointer;
border-radius:10px;
transition:.3s;
}

.cell:hover{
background:#00bcd4;
color:white;
transform:scale(1.05);
}

button{
margin-top:25px;
padding:12px 25px;
font-size:18px;
border:none;
background:#0077ff;
color:white;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0056b3;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Tic Tac Toe</h1>

<div id="status">Player X Turn</div>

<div class="board">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

<button onclick="restart()">Restart Game</button>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const status=document.getElementById("status");

let currentPlayer="X";
let gameActive=true;

const winPatterns=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach((cell,index)=>{

cell.addEventListener("click",()=>{

if(cell.innerHTML!="" || !gameActive)
return;

cell.innerHTML=currentPlayer;

checkWinner();

if(gameActive){

currentPlayer=currentPlayer=="X"?"O":"X";

status.innerHTML="Player "+currentPlayer+" Turn";

}

});

});

function checkWinner(){

for(let pattern of winPatterns){

let a=cells[pattern[0]].innerHTML;
let b=cells[pattern[1]].innerHTML;
let c=cells[pattern[2]].innerHTML;

if(a!="" && a==b && b==c){

status.innerHTML="🎉 Player "+a+" Wins!";

gameActive=false;

cells[pattern[0]].style.background="#4CAF50";
cells[pattern[1]].style.background="#4CAF50";
cells[pattern[2]].style.background="#4CAF50";

return;

}

}

let draw=true;

cells.forEach(cell=>{

if(cell.innerHTML=="")
draw=false;

});

if(draw){

status.innerHTML="🤝 Match Draw";

gameActive=false;

}

}

function restart(){

cells.forEach(cell=>{

cell.innerHTML="";
cell.style.background="#f1f1f1";

});

currentPlayer="X";
gameActive=true;

status.innerHTML="Player X Turn";

}

</script>

</body>
</html>
